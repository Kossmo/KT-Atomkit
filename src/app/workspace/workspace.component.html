<svg
  #svgEl
  class="workspace-svg"
  [attr.viewBox]="viewBoxStr"
  (mousemove)="onMouseMove($event)"
  (mouseup)="onMouseUp()"
  (mouseleave)="onMouseUp()"
>
  <!-- Bonds (visible decoration only — hit layer is rendered last) -->
  <g class="bonds-layer">
    @for (bond of visibleBonds(); track bond.id) {
      <g class="bond-deco" [class.hover]="hoveredBondId() === bond.id">
        @for (path of bondPaths(bond); track $index) {
          <path class="bond-line" [attr.d]="path" />
        }
      </g>
    }
  </g>

  <!-- Atoms -->
  <g class="atoms-layer">
    @for (atom of visibleAtoms(); track atom.id) {
      <g
        class="atom-group"
        [attr.transform]="'translate(' + atom.x + ',' + atom.y + ')'"
        (mousedown)="onAtomMouseDown($event, atom)"
        (click)="onAtomClick($event, atom)"
        (dblclick)="onAtomDblClick($event, atom)"
      >
        <circle
          class="atom-circle"
          [attr.r]="atomRadius(atom)"
          [attr.fill]="atom.element.cpkColor"
        />
        <text class="atom-label" dy="0.35em" [attr.fill]="labelColor(atom)">{{ atom.element.symbol }}</text>
      </g>
    }
  </g>

  <!-- Bond hit layer — rendered last so wide hit area beats the atoms beneath it -->
  <g class="bonds-hit-layer">
    @for (bond of visibleBonds(); track bond.id) {
      <path
        class="bond-hit"
        [attr.d]="bondHitPath(bond)"
        (mouseenter)="hoveredBondId.set(bond.id)"
        (mouseleave)="hoveredBondId.set(null)"
        (click)="onBondClick($event, bond)"
      />
    }
  </g>
</svg>

@if (atomList().length === 0) {
  <div class="empty-hint">
    <span>Click an element to place it here</span>
    <span class="sub">Drag atoms · Click bond to break it</span>
  </div>
}
