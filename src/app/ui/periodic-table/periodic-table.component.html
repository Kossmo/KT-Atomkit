<div class="pt-search">
  <div class="search-wrap">
    <input
      type="search"
      placeholder="Search element…"
      [ngModel]="query()"
      (ngModelChange)="query.set($event)"
      class="search-input"
      autocomplete="off"
      spellcheck="false"
    />
    @if (query()) {
      <button class="search-clear" type="button" (click)="query.set('')">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/>
        </svg>
      </button>
    }
  </div>
</div>

<div class="pt-list">
  @if (filtered(); as results) {
    @if (results.length === 0) {
      <div class="no-results">No element found</div>
    } @else {
      @for (el of results; track trackById($index, el)) {
        <button class="element-row" (click)="select(el)">
          <span class="el-dot" [style.background]="el.cpkColor"></span>
          <span class="el-symbol">{{ el.symbol }}</span>
          <span class="el-name">{{ el.name }}</span>
          <span class="el-bonds" [class.stable]="(el.valences.at(0) ?? 0) === 0" [title]="bondLabel(el)">
            @if ((el.valences.at(0) ?? 0) === 0) {
              <span class="bond-stable">stable</span>
            } @else {
              <span class="bond-dash">—</span>
              <span class="bond-count">{{ el.valences.at(0) }}</span>
            }
          </span>
        </button>
      }
    }
  } @else {
    @for (group of groups(); track trackByCat($index, group)) {
      <button class="group-header" (click)="toggleCategory(group.category)">
        <span class="group-label">{{ group.label }}</span>
        <svg class="group-chevron" [class.open]="isOpen(group.category)"
          width="10" height="10" viewBox="0 0 10 10" fill="none"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="2,3 5,7 8,3"/>
        </svg>
      </button>
      <div class="group-body" [class.open]="isOpen(group.category)">
        <div class="group-body-inner">
          @for (el of group.elements; track trackById($index, el)) {
            <button class="element-row" (click)="select(el)">
              <span class="el-dot" [style.background]="el.cpkColor"></span>
              <span class="el-symbol">{{ el.symbol }}</span>
              <span class="el-name">{{ el.name }}</span>
              <span class="el-bonds" [class.stable]="(el.valences.at(0) ?? 0) === 0" [title]="bondLabel(el)">
                @if ((el.valences.at(0) ?? 0) === 0) {
                  <span class="bond-stable">stable</span>
                } @else {
                  <span class="bond-dash">—</span>
                  <span class="bond-count">{{ el.valences.at(0) }}</span>
                }
              </span>
            </button>
          }
        </div>
      </div>
    }
  }
</div>
